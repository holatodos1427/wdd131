<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="Partly cloudy weather icon">
  <!-- Sun -->
  <circle cx="24" cy="24" r="9" fill="#d4b87a" opacity="0.9"/>
  <!-- Sun rays -->
  <g stroke="#d4b87a" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <line x1="24" y1="8" x2="24" y2="4"/>
    <line x1="24" y1="44" x2="24" y2="40"/>
    <line x1="8" y1="24" x2="4" y2="24"/>
    <line x1="44" y1="24" x2="40" y2="24"/>
    <line x1="13" y1="13" x2="10" y2="10"/>
    <line x1="35" y1="35" x2="38" y2="38"/>
    <line x1="35" y1="13" x2="38" y2="10"/>
    <line x1="13" y1="35" x2="10" y2="38"/>
  </g>
  <!-- Cloud -->
  <ellipse cx="38" cy="40" rx="16" ry="10" fill="#8f8a7f" opacity="0.85"/>
  <ellipse cx="28" cy="43" rx="12" ry="8" fill="#8f8a7f" opacity="0.85"/>
  <ellipse cx="34" cy="35" rx="10" ry="8" fill="#a0998e" opacity="0.9"/>
  <ellipse cx="44" cy="36" rx="8" ry="7" fill="#a0998e" opacity="0.9"/>
</svg>
