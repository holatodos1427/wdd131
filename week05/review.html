<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="author" content="David Cambeiro" />
  <meta name="description" content="Your product review has been submitted. Thank you for your feedback." />
  <title>Review Submitted | David Cambeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/form.css" />
  <link rel="stylesheet" href="styles/review.css" />
  <script src="scripts/review.js" defer></script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <span class="header-eyebrow">Thank You</span>
      <h1 class="header-title">Review Received</h1>
      <p class="header-sub">Your feedback makes a difference.</p>
    </div>
    <div class="header-accent" aria-hidden="true"></div>
  </header>

  <main class="main-content">
    <div class="confirm-card">
      <div class="confirm-icon" aria-hidden="true">✔</div>
      <h2 class="confirm-title">Submission Successful</h2>
      <p class="confirm-body">
        Your review has been recorded. We appreciate you taking the time
        to share your experience with the community.
      </p>
      <div class="confirm-count" id="review-count-badge">
      </div>
      <br />
      <a href="form.html" class="btn-back">⬅ Submit Another Review</a>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <p>©<span id="currentyear"></span> David Cambeiro Arequipa, Peru</p>
    </div>
  </footer>


</body>
</html>
